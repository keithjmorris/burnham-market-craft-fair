<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rogue Traders Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }

    /* Login */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-card { background: #fff; border-radius: 12px; border: 0.5px solid #ddd; padding: 2rem; width: 100%; max-width: 380px; }
    .login-card h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.25rem; }
    .login-card p { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
    .login-field { margin-bottom: 1rem; }
    .login-field label { display: block; font-size: 0.85rem; font-weight: 500; color: #444; margin-bottom: 0.35rem; }
    .login-field input { width: 100%; padding: 0.6rem 0.75rem; border: 0.5px solid #ccc; border-radius: 8px; font-size: 0.95rem; font-family: inherit; }
    .login-field input:focus { outline: none; border-color: #2C4A3E; box-shadow: 0 0 0 3px rgba(44,74,62,0.12); }
    .login-btn { width: 100%; padding: 0.75rem; background: #2C4A3E; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 500; font-family: inherit; cursor: pointer; }
    .login-btn:hover { background: #3D6B5C; }
    .login-btn:disabled { background: #bbb; cursor: not-allowed; }
    .login-error { font-size: 0.82rem; color: #c0392b; margin-top: 0.75rem; display: none; text-align: center; }

    /* Admin layout */
    .admin-wrap { display: none; }
    .topbar { background: #fff; border-bottom: 0.5px solid #ddd; padding: 0.85rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .topbar h1 { font-size: 1rem; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .topbar-right span { font-size: 0.82rem; color: #888; }
    .signout-btn { font-size: 0.82rem; color: #2C4A3E; background: none; border: none; cursor: pointer; text-decoration: underline; }
    .export-btn { padding: 0.5rem 1rem; background: #2C4A3E; color: #fff; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 500; font-family: inherit; cursor: pointer; text-decoration: none; display: inline-block; }
    .export-btn:hover { background: #3D6B5C; }

    .content { padding: 1.5rem; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: #fff; border-radius: 8px; border: 0.5px solid #ddd; padding: 1rem; }
    .stat-card .stat-label { font-size: 0.75rem; color: #888; margin-bottom: 0.35rem; }
    .stat-card .stat-value { font-size: 1.5rem; font-weight: 500; }

    .table-wrap { background: #fff; border-radius: 12px; border: 0.5px solid #ddd; overflow: hidden; }
    .table-header { padding: 1rem 1.25rem; border-bottom: 0.5px solid #eee; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
    .table-header h2 { font-size: 0.9rem; font-weight: 600; }
    .table-header-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-input, .sort-select { padding: 0.4rem 0.75rem; border: 0.5px solid #ccc; border-radius: 6px; font-size: 0.85rem; font-family: inherit; }
    .filter-input { width: 200px; }
    .filter-input:focus, .sort-select:focus { outline: none; border-color: #2C4A3E; }

    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    th { text-align: left; padding: 0.6rem 1rem; background: #f9f9f9; border-bottom: 0.5px solid #eee; font-weight: 500; color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 0.7rem 1rem; border-bottom: 0.5px solid #f0f0f0; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; background: #e0ebe6; color: #2C4A3E; }
    .action-btn { padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.78rem; font-family: inherit; cursor: pointer; border: 0.5px solid; margin-right: 4px; }
    .edit-btn { background: #e0ebe6; color: #2C4A3E; border-color: #b8d4c8; }
    .edit-btn:hover { background: #cfe3d8; }
    .delete-btn { background: #fcebeb; color: #a32d2d; border-color: #f7c1c1; }
    .delete-btn:hover { background: #f7d5d5; }
    .empty-state { text-align: center; padding: 3rem; color: #aaa; font-size: 0.9rem; }

    /* Edit modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid #eee; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 1; }
    .modal-header h2 { font-size: 1rem; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 1.25rem; cursor: pointer; color: #888; line-height: 1; }
    .modal-body { padding: 1.5rem; }
    .modal-field { margin-bottom: 1rem; }
    .modal-field label { display: block; font-size: 0.82rem; font-weight: 500; color: #444; margin-bottom: 0.3rem; }
    .modal-field input, .modal-field select, .modal-field textarea { width: 100%; padding: 0.55rem 0.7rem; border: 0.5px solid #ccc; border-radius: 8px; font-size: 0.9rem; font-family: inherit; }
    .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { outline: none; border-color: #2C4A3E; }
    .modal-field textarea { min-height: 80px; resize: vertical; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 0.5px solid #eee; display: flex; gap: 0.75rem; justify-content: flex-end; }
    .modal-save-btn { padding: 0.6rem 1.25rem; background: #2C4A3E; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 500; font-family: inherit; cursor: pointer; }
    .modal-save-btn:hover { background: #3D6B5C; }
    .modal-save-btn:disabled { background: #bbb; cursor: not-allowed; }
    .modal-cancel-btn { padding: 0.6rem 1.25rem; background: #fff; color: #444; border: 0.5px solid #ccc; border-radius: 8px; font-size: 0.9rem; font-family: inherit; cursor: pointer; }
    .modal-cancel-btn:hover { background: #f5f4f0; }
    .modal-status { font-size: 0.82rem; margin-bottom: 1rem; padding: 0.6rem 0.75rem; border-radius: 6px; display: none; }
    .modal-status.success { display: block; background: #eaf3de; color: #3b6d11; }
    .modal-status.error { display: block; background: #fcebeb; color: #a32d2d; }

    .loading { text-align: center; padding: 3rem; color: #888; }
  </style>
</head>
<body>

<!-- Login screen -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>Rogue Traders Admin</h1>
    <p>Sign in to manage entries</p>
    <div class="login-field">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" />
    </div>
    <div class="login-field">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
    </div>
    <button class="login-btn" id="loginBtn">Sign in</button>
    <p class="login-error" id="loginError">Incorrect email or password.</p>
  </div>
</div>

<!-- Admin dashboard -->
<div class="admin-wrap" id="adminWrap">
  <div class="topbar">
    <h1>Rogue Traders — Cipher Hunt Entries</h1>
    <div class="topbar-right">
      <span id="adminEmail"></span>
      <button class="export-btn" id="exportCsvBtn" style="background:#4a8c5f;">Export CSV</button>
      <button class="export-btn" id="exportJsonBtn">Export JSON</button>
      <button class="signout-btn" id="signoutBtn">Sign out</button>
    </div>
  </div>

  <div class="content">
    <div class="stat-card"><div class="stat-label">Total entries</div><div class="stat-value" id="statTotal">—</div></div>
<div class="stat-card"><div class="stat-label">Adults</div><div class="stat-value" id="statAdults">—</div></div>
<div class="stat-card"><div class="stat-label">Children</div><div class="stat-value" id="statChildren">—</div></div>
<div class="stat-card"><div class="stat-label">With solution</div><div class="stat-value" id="statSolutions">—</div>
</div>

    <div class="table-wrap">
      <div class="table-header">
        <h2>Entries</h2>
        <div class="table-header-controls">
          <select class="sort-select" id="sectionFilter">
  <option value="">All entries</option>
  <option value="Adult">Adults only</option>
  <option value="Child">Children only</option>
</select>
          <input type="text" class="filter-input" id="filterInput" placeholder="Search entries…" />
        </div>
      </div>
      <div id="tableContainer"><div class="loading">Loading entries…</div></div>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Edit entry</h2>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
  <div class="modal-status" id="modalStatus"></div>
  <input type="hidden" id="editRecordId" />
  <div class="modal-field"><label>Name</label><input type="text" id="editName" /></div>
  <div class="modal-field">
    <label>Age</label>
    <select id="editAge">
      <option value="Adult">Adult</option>
      <option value="Child">Child</option>
    </select>
  </div>
  <div class="modal-field"><label>Final Solution</label><input type="text" id="editFinalSolution" /></div>
  <div class="modal-field"><label>Favourite Shop</label><input type="text" id="editBonusShop" /></div>
  <div class="modal-field"><label>What made it their favourite</label><textarea id="editBonusReason"></textarea></div>
</div>
    <div class="modal-footer">
      <button class="modal-cancel-btn" id="modalCancel">Cancel</button>
      <button class="modal-save-btn" id="modalSave">Save changes</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAmMoJa-5U6Kzkj3ClL8jYB7Y3pL8ysC04",
    authDomain:        "burnhammarketcraftfair.firebaseapp.com",
    databaseURL:       "https://burnhammarketcraftfair-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "burnhammarketcraftfair",
    storageBucket:     "burnhammarketcraftfair.appspot.com",
    messagingSenderId: "388230915965",
    appId: "1:388230915965:web:93c83d174322c2aab28e14"
  };

  firebase.initializeApp(firebaseConfig);
  const db   = firebase.database();
  const auth = firebase.auth();

  let allEntries = [];
  let filterText = '';
  let sectionFilter = '';

  // ── AUTH ────────────────────────────────────────────────────────────
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('loginWrap').style.display  = 'none';
      document.getElementById('adminWrap').style.display  = 'block';
      document.getElementById('adminEmail').textContent   = user.email;
      loadEntries();
    } else {
      document.getElementById('loginWrap').style.display  = 'flex';
      document.getElementById('adminWrap').style.display  = 'none';
    }
  });

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');
    const err      = document.getElementById('loginError');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch (e) {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });

  document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });

  document.getElementById('signoutBtn').addEventListener('click', () => auth.signOut());

  // ── LOAD ENTRIES ────────────────────────────────────────────────────
  function loadEntries() {
    db.ref('rogue-traders/entries').on('value', snap => {
      const raw = snap.val();
      allEntries = raw ? Object.entries(raw).map(([key, val]) => ({ _key: key, ...val })) : [];
      allEntries.sort((a, b) => new Date(b.submittedAt || 0) - new Date(a.submittedAt || 0));
      updateStats();
      renderTable();
    });
  }

  function updateStats() {
  document.getElementById('statTotal').textContent     = allEntries.length;
  document.getElementById('statAdults').textContent    = allEntries.filter(e => e.age === 'Adult').length;
  document.getElementById('statChildren').textContent  = allEntries.filter(e => e.age === 'Child').length;
  document.getElementById('statSolutions').textContent = allEntries.filter(e => e.finalSolution && e.finalSolution.trim()).length;
}

  function renderTable() {
    let filtered = allEntries;

    if (sectionFilter) {
  filtered = filtered.filter(e => e.age === sectionFilter);
}
    if (filterText) {
      filtered = filtered.filter(e => [e.name, e.address, e.telephone, e.classes, e.notes]
        .join(' ').toLowerCase().includes(filterText.toLowerCase()));
    }

    const container = document.getElementById('tableContainer');
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state">No entries found.</div>';
      return;
    }

    let html = `<div style="overflow-x:auto;"><table>
  <thead><tr>
    <th>Name</th><th>Age</th><th>Sightings</th><th>Final Solution</th>
    <th>Favourite Shop</th><th>Submitted</th><th>Actions</th>
  </tr></thead><tbody>`;

    filtered.forEach(e => {
  const date = e.submittedAt ? new Date(e.submittedAt).toLocaleString('en-GB') : '—';
  const sightingCount = e.sightings ? Object.keys(e.sightings).length : 0;
  html += `<tr>
    <td>${esc(e.name)}</td>
    <td><span class="tag">${esc(e.age)}</span></td>
    <td style="text-align:center;">${sightingCount}</td>
    <td><strong>${esc(e.finalSolution) || '<span style="color:#bbb">—</span>'}</strong></td>
    <td>${esc(e.bonusShop) || '<span style="color:#bbb">—</span>'}</td>
    <td style="white-space:nowrap;font-size:0.78rem;">${date}</td>
    <td style="white-space:nowrap;">
      <button class="action-btn edit-btn" onclick="openEdit('${e._key}')">Edit</button>
      <button class="action-btn delete-btn" onclick="deleteEntry('${e._key}', '${esc(e.name)}')">Delete</button>
    </td>
  </tr>`;
});

    html += '</tbody></table></div>';
    container.innerHTML = html;
  }

  document.getElementById('filterInput').addEventListener('input', e => {
    filterText = e.target.value;
    renderTable();
  });

  document.getElementById('sectionFilter').addEventListener('change', e => {
    sectionFilter = e.target.value;
    renderTable();
  });

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── DELETE ───────────────────────────────────────────────────────────
  async function deleteEntry(key, name) {
    if (!confirm(`Delete entry for "${name}"? This cannot be undone.`)) return;
    try {
      await db.ref(`rogue-traders/entries/${key}`).remove();
    } catch (err) {
      alert('Delete failed — please try again.');
    }
  }

  // ── EDIT MODAL ───────────────────────────────────────────────────────
  function openEdit(key) {
  const entry = allEntries.find(e => e._key === key);
  if (!entry) return;
  document.getElementById('editRecordId').value      = key;
  document.getElementById('editName').value          = entry.name          || '';
  document.getElementById('editAge').value           = entry.age           || 'Adult';
  document.getElementById('editFinalSolution').value = entry.finalSolution || '';
  document.getElementById('editBonusShop').value     = entry.bonusShop     || '';
  document.getElementById('editBonusReason').value   = entry.bonusReason   || '';

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

  document.getElementById('modalSave').addEventListener('click', async () => {
    const key = document.getElementById('editRecordId').value;
    const btn = document.getElementById('modalSave');
    const ms  = document.getElementById('modalStatus');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    ms.className = 'modal-status';
    ms.style.display = 'none';

    try {
      await db.ref(`rogue-traders/entries/${key}`).update({
  name:          document.getElementById('editName').value.trim(),
  age:           document.getElementById('editAge').value,
  finalSolution: document.getElementById('editFinalSolution').value.trim(),
  bonusShop:     document.getElementById('editBonusShop').value.trim(),
  bonusReason:   document.getElementById('editBonusReason').value.trim(),
  updatedAt:     new Date().toISOString()
});
      ms.className = 'modal-status success';
      ms.textContent = '✓ Saved successfully.';
      ms.style.display = 'block';
      btn.textContent = 'Save changes';
      btn.disabled = false;
      setTimeout(closeModal, 1200);
    } catch (err) {
      ms.className = 'modal-status error';
      ms.textContent = 'Save failed — please try again.';
      ms.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Save changes';
    }
  });

  // ── EXPORT ───────────────────────────────────────────────────────────
  document.getElementById('exportJsonBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(allEntries, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `rogue-traders-entries-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('exportCsvBtn').addEventListener('click', () => {
    const headers = ['Name', 'Age', 'Number of Sightings', 'Final Solution', 'Favourite Shop', 'Why Favourite', 'Submitted At'];
const rows = allEntries.map(e => [
  e.name, e.age || '',
  e.sightings ? Object.keys(e.sightings).length : 0,
  e.finalSolution || '', e.bonusShop || '', e.bonusReason || '',
  e.submittedAt || ''
].map(val => `"${String(val).replace(/"/g, '""')}"`).join(','));
    const csv  = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `rogue-traders-entries-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  });
</script>
</body>
</html>
